appId: com.arcadecabinet.ashworthmanor
name: "Critical Path - Shared Spine Debug Helper"
tags:
  - e2e
  - critical_path
  - debug_helper
---

# Debug APKs should be exported with `--maestro-helper` so semantic labels are
# visible over interactables and thresholds.

# === APP LAUNCH / FRONT GATE DOCUMENT ===
- launchApp:
    appId: com.arcadecabinet.ashworthmanor
    stopApp: true
- tapOn:
    text: "Got it"
    optional: true
- extendedWaitUntil:
    timeout: 30000
    visible: "Maestro Helper"
- extendedWaitUntil:
    timeout: 30000
    visible: "Room: Front Gate"
- extendedWaitUntil:
    visible: "Dismiss Document"
    timeout: 10000
- takeScreenshot: screenshots/maestro/01_front_gate_document

# === FRONT GATE ===
- tapOn: "01 DISMISS"
- waitForAnimationToEnd
- tapOn: "02 OPEN VALISE"
- waitForAnimationToEnd
- takeScreenshot: screenshots/maestro/02_valise
- tapOn: "01 DISMISS"
- waitForAnimationToEnd
- tapOn: "03 DRIVE LOWER"
- waitForAnimationToEnd
- tapOn: "04 DRIVE UPPER"
- waitForAnimationToEnd
- tapOn: "05 FRONT STEPS"
- waitForAnimationToEnd
- tapOn: "06 FOYER"
- waitForAnimationToEnd

# === FOYER ===
- extendedWaitUntil:
    visible: "Room: Foyer"
    timeout: 8000
- takeScreenshot: screenshots/maestro/03_foyer
- tapOn: "07 PARLOR"
- waitForAnimationToEnd

# === PARLOR / FIRST WARMTH ===
- extendedWaitUntil:
    visible: "Room: Parlor"
    timeout: 8000
- tapOn: "08 LIGHT FIRE"
- waitForAnimationToEnd
- takeScreenshot: screenshots/maestro/04_first_warmth

# === KITCHEN / DEEPER CONTINUATION ===
- tapOn: "01 DISMISS"
- waitForAnimationToEnd
- tapOn: "06 FOYER"
- waitForAnimationToEnd
- tapOn: "09 KITCHEN"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Room: Kitchen"
    timeout: 8000
- tapOn: "10 SERVICE HATCH"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Room: Storage Basement"
    timeout: 8000
- takeScreenshot: screenshots/maestro/05_storage_basement
