appId: com.arcadecabinet.ashworthmanor
name: "Smoke Test - App launches and renders"
tags:
  - smoke
  - ci
---

# Launch the app
- launchApp:
    appId: com.arcadecabinet.ashworthmanor
    stopApp: true

# Dismiss Android's fullscreen notification if it appears
- tapOn:
    text: "Got it"
    optional: true

# Wait for the helper and opening room to become OCR-stable
- extendedWaitUntil:
    timeout: 30000
    visible: "Maestro Helper"
- extendedWaitUntil:
    timeout: 30000
    visible: "Room: Front Gate"

- takeScreenshot: screenshots/maestro/smoke_01_launch

# Dismiss the opening document and confirm the debug helper still tracks state.
- tapOn: "01 DISMISS"
- waitForAnimationToEnd
- extendedWaitUntil:
    timeout: 10000
    visible: "Open Valise"
- takeScreenshot: screenshots/maestro/smoke_02_front_gate

# Look around by swiping (camera rotation)
- swipe:
    start: "70%,50%"
    end: "30%,50%"
    duration: 500
- takeScreenshot: screenshots/maestro/smoke_03_look_right

- swipe:
    start: "30%,50%"
    end: "70%,50%"
    duration: 500
- takeScreenshot: screenshots/maestro/smoke_04_look_left

# Tap to walk forward
- tapOn:
    point: "50%,40%"
- extendedWaitUntil:
    timeout: 10000
    visible: "Drive Lower"
- takeScreenshot: screenshots/maestro/smoke_05_walked

# App is still running (didn't crash)
- takeScreenshot: screenshots/maestro/smoke_06_stable
